services:
  - type: web
    name: iiest-student-teacher-ai-portal
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash deploy/start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: API_BASE_URL
        value: http://127.0.0.1:8001
